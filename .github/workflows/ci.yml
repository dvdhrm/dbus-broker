#
# Continuous Integration
#
# This is the main entry-point of the continuous integration of this project.
# It is triggered by pull-requests and pushes, but can optionally be manually
# triggered via the GitHub APIs.
#
# This workflow first runs sanity tests, a very basic build, and the test-suite
# with default configurations. Only if all these succeed it will proceed and
# spawn the more elaborate test-suite. This ensures that simple bugs are caught
# early and do not trigger the full test-suite, fuzzers, or static analyzers.
#
# This workflow triggers on any pull-request and push, except for pushes to
# branches called `pr/*`. This is a workaround for GitHub which can be used to
# avoid running the test-suite on PR branches, and only run it in the PR
# itself. For example, a push to a forked repository `dvdhrm/dbus-broker` named
# `pr/socket-rework` will not trigger the CI of the forked repository for this
# push. However, once a PR is filed against `bus1/dbus-broker`, the
# pull-request trigger will run the CI. This workaround avoids running the CI
# twice, once in the fork and once upstream. However, this workaround still
# allows running the CI in forks by simply using branches other than `pr/*`.
#
# Lastly, the continuous integration can be triggered manually via the
# workflow-dispatch trigger, either via the GitHub API or via the GitHub UI.
#

name: "Continuous Integration"

on:
  pull_request:
  push:
    branches-ignore: ["pr/**"]
    tags: ["**"]
  workflow_dispatch:

defaults:
  run:
    shell: "bash"

jobs:
  #
  # A complete but basic build of the project, running on common x86-64 ubuntu
  # machines. This should catch most compilation errors or test-suite failures
  # but runs pretty fast. No fuzzing, benchmarking, sanitizing, or other long
  # running operations are done.
  #
  basic_meson:
    name: "Basic: basic @ Ubuntu-x86_64-clang-release +APPARMOR +AUDIT +DOCS +LAUNCHER +SELINUX"

    container:
      image: "ghcr.io/readaheadeu/rae-ci-ubuntu:latest"
      options: "--user root"
    env:
      CC: "clang"
      CFLAGS: "-Werror"
    runs-on: "ubuntu-latest"

    steps:
    - name: "Fetch Sources"
      uses: actions/checkout@v4

    - name: "Setup Meson"
      run: |
        meson setup \
          --buildtype "debugoptimized" \
          --warnlevel "2" \
          -D "apparmor=true" \
          -D "audit=true" \
          -D "docs=true" \
          -D "launcher=true" \
          -D "selinux=true" \
          "./build" \
          "."

    - name: "Compile Project"
      run: meson compile -C "./build"

    - name: "Run Tests"
      run: meson test -C "./build" --print-errorlogs

  #
  # A simple no-op job that serves as guard. All extended jobs depend on this
  # job, and thus we can accumulate the basic dependencies here, instead of
  # duplicating them everywhere.
  #
  ext_guard:
    name: "Guard Ext-Jobs"
    needs: [basic_meson]
    runs-on: "ubuntu-latest"
    steps:
    - name: "No-op"
      run: |

  #
  # A release build running on ARM64. This uses the standard image provided by
  # GitHub and installs dependencies manually. All supported features are
  # enabled and the full test suite is run.
  #
  ext_arm64:
    name: "Ext: arm64 @ Ubuntu-arm64-clang-release +APPARMOR +AUDIT +DOCS +LAUNCHER +SELINUX"
    needs: ext_guard

    container:
      image: "ghcr.io/readaheadeu/rae-ci-ubuntu:latest"
      options: "--user root"
    env:
      CC: "clang"
      CFLAGS: "-Werror"
    runs-on: "ubuntu-24.04-arm"

    steps:
    - name: "Fetch Sources"
      uses: actions/checkout@v4

    - name: "Setup Meson"
      run: |
        meson setup \
          --buildtype "debugoptimized" \
          --warnlevel "2" \
          -D "apparmor=true" \
          -D "audit=true" \
          -D "docs=true" \
          -D "launcher=true" \
          -D "selinux=true" \
          "./build" \
          "."

    - name: "Compile Project"
      run: meson compile -C "./build"

    - name: "Run Tests"
      run: meson test -C "./build" --print-errorlogs

  #
  # A matrix of project builds with different settings. All builds run the
  # included test suite. This includes builds with and without debug options,
  # optimizations, and meson-options of the project.
  #
  ext_meson:
    name: "Ext: ${{ matrix.id }} @ ${{ matrix.name }}"
    needs: ext_guard

    strategy:
      fail-fast: false
      matrix:
        include:
        # Test a release build as recommended by upstream. This picks clang as
        # compiler with debug-optimized as build-target. This test also builds
        # documentation and related resources.
        - id: "release"
          name: "Arch-x86_64-clang-release +AUDIT +DOCS +LAUNCHER"

          # Explicitly set all options here to document them.
          buildtype: "debugoptimized"
          cc: "clang"
          cflags: "-Werror"
          image: "ghcr.io/readaheadeu/rae-ci-archlinux:latest"
          rustflags: ""
          setupargs: "-D audit=true -D docs=true -D launcher=true"
          warnlevel: "2"

        # A release build with `--cross-file lib32` to test on 32-bit.
        - id: "32bit"
          name: "Arch-i686-clang-release +LAUNCHER"

          buildtype: "debugoptimized"
          cc: "clang"
          cflags: "-Werror"
          image: "ghcr.io/readaheadeu/rae-ci-archlinux:latest"
          rustflags: "--target i686-unknown-linux-gnu"
          setupargs: "-D launcher=true --cross-file lib32"
          warnlevel: "2"

        # A reduced build with `-O0` to verify we do not rely on dead-code
        # elimination.
        - id: "O0-PLAIN"
          name: "Arch-x86_64-gcc-plain +AUDIT +LAUNCHER"

          buildtype: "plain"
          cc: "gcc"
          cflags: "-O0 -Werror"
          image: "ghcr.io/readaheadeu/rae-ci-archlinux:latest"
          setupargs: "-D audit=true -D launcher=true"
          warnlevel: "2"

        # An aggressive -O3 -DNDEBUG build that verfies that we properly
        # follow strict aliasing rules and do not rely on debug builds.
        - id: "O3-NDEBUG"
          name: "Arch-x86_64-gcc-ndebug +AUDIT +LAUNCHER"

          buildtype: "release"
          cc: "gcc"
          cflags: "-O3 -Werror -DNDEBUG"
          image: "ghcr.io/readaheadeu/rae-ci-archlinux:latest"
          setupargs: "-D audit=true -D launcher=true"
          warnlevel: "2"

        # Disable all options to compile-test their fallbacks. Run the test
        # suite to run basic fallback verification.
        - id: "fallback"
          name: "Arch-x86_64-clang-release"

          buildtype: "debugoptimized"
          cc: "clang"
          cflags: "-Werror"
          image: "ghcr.io/readaheadeu/rae-ci-archlinux:latest"
          setupargs: "-D launcher=false"
          warnlevel: "2"

        # Run on Ubuntu to test the AppArmor integration.
        - id: "ubuntu"
          name: "Ubuntu-x86_64-clang-release +APPARMOR +AUDIT +LAUNCHER +SELINUX"

          buildtype: "debugoptimized"
          cc: "clang"
          cflags: "-Werror"
          image: "ghcr.io/readaheadeu/rae-ci-ubuntu:latest"
          setupargs: "-D apparmor=true -D audit=true -D launcher=true -D selinux=true"
          warnlevel: "2"

        # Run with address-sanitizers enabled.
        - id: "asan"
          name: "Ubuntu-x86_64-clang-release +APPARMOR +AUDIT +LAUNCHER +SELINUX"

          buildtype: "debugoptimized"
          cc: "clang"
          cflags: "-Werror"
          image: "ghcr.io/readaheadeu/rae-ci-ubuntu:latest"
          setupargs: "-D b_sanitize=address -D b_lundef=false -D apparmor=true -D audit=true -D launcher=true -D selinux=true"
          warnlevel: "2"

        # Run with undefined-behavior-sanitizers enabled.
        - id: "ubsan"
          name: "Ubuntu-x86_64-clang-release +APPARMOR +AUDIT +LAUNCHER +SELINUX"

          buildtype: "debugoptimized"
          cc: "clang"
          cflags: "-Werror"
          image: "ghcr.io/readaheadeu/rae-ci-ubuntu:latest"
          setupargs: "-D b_sanitize=undefined -D b_lundef=false -D apparmor=true -D audit=true -D launcher=true -D selinux=true"
          warnlevel: "2"

    container:
      image: ${{ matrix.image }}
      options: "--user root"
    env:
      ASAN_OPTIONS: "strict_string_checks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1"
      CC: ${{ matrix.cc }}
      CFLAGS: ${{ matrix.cflags }}
      UBSAN_OPTIONS: "print_stacktrace=1:print_summary=1:halt_on_error=1"
    runs-on: "ubuntu-latest"

    steps:
    - name: "Fetch Sources"
      uses: actions/checkout@v4

    - name: "Setup Meson"
      run: |
        meson setup \
          --buildtype "${{ matrix.buildtype }}" \
          --warnlevel "${{ matrix.warnlevel }}" \
          ${{ matrix.setupargs }} \
          "./build" \
          "."

    - name: "Compile Project"
      run: meson compile -C "./build"

    - name: "Run Tests"
      run: meson test -C "./build" --print-errorlogs

  #
  # A release build running through valgrind. We disable all features
  # that currently do not support valgrind runs (in particular sd-bus in
  # the launcher).
  #
  ext_valgrind:
    name: "Ext: valgrind @ Arch-x86_64-clang-release +AUDIT"
    needs: ext_guard

    container:
      image: "ghcr.io/readaheadeu/rae-ci-archlinux:latest"
      options: "--user root"
    env:
      CC: "clang"
      CFLAGS: "-Werror"
    runs-on: "ubuntu-latest"

    steps:
    - name: "Fetch Sources"
      uses: actions/checkout@v4

    - name: "Setup Meson"
      run: |
        meson setup \
          --buildtype "debugoptimized" \
          --warnlevel "2" \
          -D "audit=true" \
          -D "launcher=false" \
          "./build" \
          "."

    - name: "Compile Project"
      run: meson compile -C "./build"

    - name: "Run Valgrind"
      run: |
        args=(
          "--gen-suppressions=all"
          "--trace-children=yes"
          "--leak-check=full"
          "--error-exitcode=1"
        )
        meson test \
          -C "./build" \
          --print-errorlogs \
          --timeout-multiplier=16 \
          --wrapper="valgrind ${args[*]}"
